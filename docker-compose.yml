version: '3.8'
services:
  voicebot:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ASR_MODEL=base
      - TTS_ENGINE=gtts
      - LOG_LEVEL=INFO
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
